<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shop — {{SHOP_NAME}}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  </head>
  <body>
    <div class="bg-blobs"><div class="blob blob--a"></div><div class="blob blob--b"></div></div>
    <div data-include="header"></div>
    <main class="container">
      <h1 class="section-title" style="margin-top: 1rem">Catalog</h1>
      <div id="cat-chips" style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1rem"></div>
      <div class="search-live">
        <input type="search" id="q" placeholder="Search products…" />
        <select id="sort">
          <option value="name">Sort: A–Z</option>
          <option value="price_asc">Price ↑</option>
          <option value="price_desc">Price ↓</option>
          <option value="newest">Newest</option>
        </select>
      </div>
      <div id="grid" class="grid-products"></div>
      <div style="margin-top: 1rem; display: flex; gap: 0.5rem">
        <button type="button" class="btn btn--ghost btn--sm" id="prev">Prev</button>
        <button type="button" class="btn btn--ghost btn--sm" id="next">Next</button>
      </div>
      <section style="margin-top: 3rem">
        <h2 class="section-title">Categories</h2>
        <div class="swiper cat-swiper">
          <div class="swiper-wrapper" id="swiper-cats"></div>
        </div>
      </section>
    </main>
    <div data-include="footer"></div>
    <script src="assets/js/config.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/ui.js"></script>
    <script src="assets/js/i18n.js"></script>
    <script src="assets/js/layout.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="assets/js/catalog.js"></script>
  </body>
</html>
